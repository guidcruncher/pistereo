name: pistereo-dev

services:
  pistereo-dev:
    extra_hosts:
      - pistereo-dev:127.0.0.1
    dns:
      - 192.168.1.201
    build:
      context: .
      dockerfile: Dockerfile.dev
    stdin_open: true
    tty: true
    network_mode: host
    expose:
      - 3000
    environment:
      - HOST_IP=${HOST_IP} # export HOST_IP=$(hostname -I | awk '{print $1}')
      - NODE_CONFIG_DIR=/usr/src/app/config
      - TZ=Europe/London
    volumes:
      - ./:/usr/src/app
      - ./config:/usr/src/app/config
      - ../cache/:/usr/src/mediaserver/config
      - ../tmp/:/usr/src/app/appcache
      - ./socket:/usr/src/mediaserver/socket
    container_name: pistereo-dev
    hostname: pistereo-dev
    restart: unless-stopped
    devices:
      - /dev/snd:/dev/snd:rw
    privileged: true
